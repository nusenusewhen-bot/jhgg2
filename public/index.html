<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Persistent Bot | Railway Deploy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0ff;
        }
        .container {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 4px;
            background: linear-gradient(90deg, #00d4ff, #b829dd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #6b6b8d;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #a0a0c0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            background: #0f0f1a;
            border: 2px solid #2a2a4a;
            border-radius: 10px;
            color: #e0e0ff;
            font-size: 14px;
            transition: all 0.2s;
            font-family: 'SF Mono', Monaco, monospace;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .input-error {
            border-color: #ff3366 !important;
        }
        .error-text {
            color: #ff3366;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
        .error-text.visible {
            display: block;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }
        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff3366, #cc0055);
            color: white;
        }
        .btn-danger:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(255, 51, 102, 0.3);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .status-panel {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            display: none;
        }
        .status-panel.active {
            display: block;
        }
        .status-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }
        .status-dot.connected { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .status-dot.error { background: #ff3366; box-shadow: 0 0 8px #ff3366; }
        .status-dot.processing { background: #ffaa00; animation: pulse 1s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .log-container {
            max-height: 250px;
            overflow-y: auto;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #1a1a2e;
            color: #8892b0;
        }
        .log-entry.success { color: #00ff88; }
        .log-entry.error { color: #ff3366; }
        .log-entry.info { color: #00d4ff; }
        .log-entry.status { color: #ffaa00; }
        .bot-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
            padding: 12px;
            background: #0f0f1a;
            border-radius: 8px;
        }
        .info-item {
            font-size: 12px;
        }
        .info-label {
            color: #6b6b8d;
            margin-bottom: 2px;
        }
        .info-value {
            color: #e0e0ff;
            font-weight: 600;
        }
        .features {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .feature-tag {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Roblox Persistent Bot</h1>
        <p class="subtitle">WebSocket Presence | Manual Leave Control | Railway Ready</p>
        
        <div class="features">
            <div class="feature-tag">Real-time Validation</div>
            <div class="feature-tag">WebSocket Presence</div>
            <div class="feature-tag">Stay Until Leave</div>
            <div class="feature-tag">CSRF Auto-Retry</div>
        </div>

        <form id="botForm" novalidate>
            <div class="form-group">
                <label for="cookie">Roblox Cookie (.ROBLOSECURITY)</label>
                <textarea 
                    id="cookie" 
                    placeholder="Paste your .ROBLOSECURITY cookie here (min 100 chars)..."
                ></textarea>
                <div class="error-text" id="cookieError">Cookie must be at least 100 characters and contain valid base64 format</div>
            </div>

            <div class="form-group">
                <label for="privateServer">Private Server Link</label>
                <input 
                    type="url" 
                    id="privateServer" 
                    placeholder="https://www.roblox.com/games/123456789/...?privateServerLinkCode=..."
                >
                <div class="error-text" id="linkError">Must be a valid Roblox private server URL</div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-primary" id="startBtn">
                    Initialize & Join
                </button>
                <button type="button" class="btn-danger" id="leaveBtn" disabled>
                    Leave Server
                </button>
            </div>
        </form>

        <div class="status-panel" id="statusPanel">
            <div class="status-header">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Disconnected</span>
            </div>
            <div class="bot-info" id="botInfo" style="display:none;">
                <div class="info-item">
                    <div class="info-label">User</div>
                    <div class="info-value" id="userName">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Game</div>
                    <div class="info-value" id="gameName">-</div>
                </div>
            </div>
            <div class="log-container" id="logs"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('botForm');
        const cookieInput = document.getElementById('cookie');
        const linkInput = document.getElementById('privateServer');
        const cookieError = document.getElementById('cookieError');
        const linkError = document.getElementById('linkError');
        const startBtn = document.getElementById('startBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const statusPanel = document.getElementById('statusPanel');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const logs = document.getElementById('logs');
        const botInfo = document.getElementById('botInfo');
        const userNameEl = document.getElementById('userName');
        const gameNameEl = document.getElementById('gameName');

        let ws = null;
        let isBotActive = false;

        function validateCookie(value) {
            const trimmed = value.trim();
            return trimmed.length >= 100 && /^[A-Za-z0-9+/=]+$/.test(trimmed);
        }

        function validateLink(value) {
            const trimmed = value.trim();
            try {
                const url = new URL(trimmed);
                return url.hostname.includes('roblox.com') && 
                       (trimmed.includes('privateServer') || trimmed.includes('privateServerLinkCode'));
            } catch {
                return false;
            }
        }

        function showFieldError(input, errorEl, show) {
            if (show) {
                input.classList.add('input-error');
                errorEl.classList.add('visible');
            } else {
                input.classList.remove('input-error');
                errorEl.classList.remove('visible');
            }
        }

        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
        }

        function setStatus(state, text) {
            statusDot.className = 'status-dot ' + state;
            statusText.textContent = text;
            statusPanel.classList.add('active');
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                setStatus('connected', 'WebSocket Connected');
                addLog('WebSocket connection established', 'success');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                switch(data.type) {
                    case 'connected':
                        addLog(`Bot ID assigned: ${data.botId}`, 'info');
                        break;
                    case 'status':
                        setStatus('processing', data.message);
                        addLog(data.message, 'status');
                        break;
                    case 'success':
                        setStatus('connected', 'Bot Active in Game');
                        addLog(data.message, 'success');
                        if (data.data) {
                            addLog(`Server response: ${JSON.stringify(data.data)}`, 'info');
                        }
                        break;
                    case 'error':
                        setStatus('error', 'Error Occurred');
                        addLog(data.message, 'error');
                        break;
                    case 'presence':
                        addLog(data.message, 'info');
                        break;
                }

                if (data.message && data.message.includes('Authenticated as')) {
                    const match = data.message.match(/Authenticated as (.+)/);
                    if (match) {
                        userNameEl.textContent = match[1];
                        botInfo.style.display = 'grid';
                    }
                }
                
                if (data.message && data.message.includes('Game:')) {
                    const match = data.message.match(/Game: (.+)/);
                    if (match) {
                        gameNameEl.textContent = match[1];
                    }
                }
            };

            ws.onerror = (error) => {
                setStatus('error', 'Connection Error');
                addLog('WebSocket error occurred', 'error');
            };

            ws.onclose = () => {
                setStatus('error', 'Disconnected');
                addLog('WebSocket connection closed', 'error');
                isBotActive = false;
                startBtn.disabled = false;
                leaveBtn.disabled = true;
                startBtn.textContent = 'Initialize & Join';
            };
        }

        cookieInput.addEventListener('input', () => {
            showFieldError(cookieInput, cookieError, false);
        });

        linkInput.addEventListener('input', () => {
            showFieldError(linkInput, linkError, false);
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const cookie = cookieInput.value.trim();
            const link = linkInput.value.trim();
            
            let hasError = false;

            if (!validateCookie(cookie)) {
                showFieldError(cookieInput, cookieError, true);
                hasError = true;
            }

            if (!validateLink(link)) {
                showFieldError(linkInput, linkError, true);
                hasError = true;
            }

            if (hasError) return;

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                connectWebSocket();
            }

            logs.innerHTML = '';
            statusPanel.classList.add('active');
            
            setTimeout(() => {
                ws.send(JSON.stringify({
                    action: 'start',
                    cookie,
                    privateServerLink: link
                }));
            }, 500);

            isBotActive = true;
            startBtn.disabled = true;
            startBtn.textContent = 'Bot Running...';
            leaveBtn.disabled = false;
        });

        leaveBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'leave' }));
                addLog('Sending leave command...', 'status');
            }
            
            isBotActive = false;
            startBtn.disabled = false;
            startBtn.textContent = 'Initialize & Join';
            leaveBtn.disabled = true;
            botInfo.style.display = 'none';
            userNameEl.textContent = '-';
            gameNameEl.textContent = '-';
        });

        window.addEventListener('beforeunload', () => {
            if (ws) ws.close();
        });
    </script>
</body>
</html>

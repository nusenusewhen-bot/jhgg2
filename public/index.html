<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Bot Controller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }
        .main {
            width: 100%;
            max-width: 560px;
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 26px;
            background: linear-gradient(90deg, #00d4ff, #b829dd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .header p {
            color: #6b6b8d;
            font-size: 13px;
        }
        .card {
            background: #141428;
            border: 1px solid #2a2a4a;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #a0a0c0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            background: #0a0a0f;
            border: 2px solid #2a2a4a;
            border-radius: 10px;
            color: #e0e0ff;
            font-size: 14px;
            font-family: 'SF Mono', Monaco, monospace;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        input.error, textarea.error {
            border-color: #ff3366;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .error-msg {
            color: #ff3366;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .hint {
            color: #6b6b8d;
            font-size: 12px;
            margin-top: 6px;
        }
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }
        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-start {
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            color: white;
        }
        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.25);
        }
        .btn-leave {
            background: linear-gradient(135deg, #ff3366, #cc0055);
            color: white;
        }
        .btn-leave:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 51, 102, 0.25);
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .console {
            background: #0a0a0f;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 16px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            line-height: 1.7;
            max-height: 320px;
            overflow-y: auto;
            display: none;
        }
        .console.active {
            display: block;
        }
        .console-line {
            padding: 2px 0;
            border-bottom: 1px solid #1a1a2e;
            color: #8892b0;
        }
        .console-line.success { color: #00ff88; }
        .console-line.error { color: #ff3366; }
        .console-line.status { color: #ffaa00; }
        .console-line.info { color: #00d4ff; }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #0a0a0f;
            border-radius: 10px;
            margin-bottom: 12px;
            display: none;
        }
        .status-bar.active {
            display: flex;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
            flex-shrink: 0;
        }
        .status-dot.green { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
        .status-dot.red { background: #ff3366; box-shadow: 0 0 6px #ff3366; }
        .status-dot.yellow { background: #ffaa00; animation: blink 1s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .status-text {
            font-size: 13px;
            font-weight: 600;
            color: #e0e0ff;
        }
        .bot-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
            display: none;
        }
        .bot-stats.active {
            display: grid;
        }
        .stat-box {
            background: #0a0a0f;
            padding: 12px;
            border-radius: 8px;
        }
        .stat-label {
            font-size: 11px;
            color: #6b6b8d;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 14px;
            font-weight: 700;
            color: #e0e0ff;
            word-break: break-all;
        }
        .connection-status {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .conn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff3366;
        }
        .conn-dot.online {
            background: #00ff88;
            box-shadow: 0 0 4px #00ff88;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="connection-status" id="connStatus">
            <div class="conn-dot" id="connDot"></div>
            <span id="connText">Disconnected</span>
        </div>

        <div class="header">
            <h1>Roblox Bot Controller</h1>
            <p>WebSocket Control | No Refresh | Persistent Presence</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label for="cookie">Cookie (.ROBLOSECURITY)</label>
                <textarea id="cookie" rows="4" placeholder="Paste cookie here..."></textarea>
                <div class="error-msg" id="cookieErr">Invalid: Must be 100+ characters, base64 format</div>
                <div class="hint">Min 100 chars, alphanumeric + / = only</div>
            </div>

            <div class="input-group">
                <label for="psLink">Private Server Link</label>
                <input type="text" id="psLink" placeholder="https://www.roblox.com/games/...?privateServerLinkCode=...">
                <div class="error-msg" id="linkErr">Invalid: Must be roblox.com URL with privateServerLinkCode</div>
                <div class="hint">Full Roblox private server invitation URL</div>
            </div>

            <div class="actions">
                <button class="btn-start" id="startBtn" onclick="handleStart()">Initialize & Join</button>
                <button class="btn-leave" id="leaveBtn" onclick="handleLeave()" disabled>Leave Server</button>
            </div>
        </div>

        <div class="card" id="statusCard" style="display:none;">
            <div class="status-bar" id="statusBar">
                <div class="status-dot" id="statusDot"></div>
                <div class="status-text" id="statusText">Ready</div>
            </div>

            <div class="bot-stats" id="botStats">
                <div class="stat-box">
                    <div class="stat-label">User</div>
                    <div class="stat-value" id="statUser">-</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Game</div>
                    <div class="stat-value" id="statGame">-</div>
                </div>
            </div>

            <div class="console" id="console"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let isRunning = false;

        const $ = id => document.getElementById(id);
        const cookieInput = $('cookie');
        const psInput = $('psLink');
        const startBtn = $('startBtn');
        const leaveBtn = $('leaveBtn');
        const statusCard = $('statusCard');
        const statusBar = $('statusBar');
        const statusDot = $('statusDot');
        const statusText = $('statusText');
        const botStats = $('botStats');
        const statUser = $('statUser');
        const statGame = $('statGame');
        const consoleEl = $('console');
        const connDot = $('connDot');
        const connText = $('connText');

        function validate() {
            let ok = true;
            
            const cookie = cookieInput.value.trim();
            if (!cookie || cookie.length < 100 || !/^[A-Za-z0-9+/=]+$/.test(cookie)) {
                cookieInput.classList.add('error');
                $('cookieErr').classList.add('show');
                ok = false;
            } else {
                cookieInput.classList.remove('error');
                $('cookieErr').classList.remove('show');
            }

            const link = psInput.value.trim();
            try {
                const url = new URL(link);
                if (!url.hostname.includes('roblox.com') || !link.includes('privateServer')) {
                    throw new Error();
                }
                psInput.classList.remove('error');
                $('linkErr').classList.remove('show');
            } catch {
                psInput.classList.add('error');
                $('linkErr').classList.add('show');
                ok = false;
            }

            return ok ? { cookie, link } : null;
        }

        function setStatus(state, text) {
            statusBar.classList.add('active');
            statusDot.className = 'status-dot ' + state;
            statusText.textContent = text;
            statusCard.style.display = 'block';
        }

        function log(msg, type = 'info') {
            consoleEl.classList.add('active');
            const line = document.createElement('div');
            line.className = `console-line ${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function connectWS() {
            if (ws && ws.readyState === WebSocket.OPEN) return;

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                connDot.classList.add('online');
                connText.textContent = 'WebSocket Online';
                log('WebSocket connected', 'success');
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                
                switch(data.type) {
                    case 'connected':
                        log(`Session ID: ${data.botId}`, 'info');
                        break;
                    case 'status':
                        setStatus('yellow', data.message);
                        log(data.message, 'status');
                        if (data.message.includes('Authenticated as')) {
                            const name = data.message.match(/as (.+)/)?.[1];
                            if (name) {
                                statUser.textContent = name;
                                botStats.classList.add('active');
                            }
                        }
                        if (data.message.includes('Target:')) {
                            const game = data.message.match(/Target: (.+)/)?.[1];
                            if (game) {
                                statGame.textContent = game;
                            }
                        }
                        break;
                    case 'success':
                        setStatus('green', 'Bot Active in Game');
                        log(data.message, 'success');
                        isRunning = true;
                        startBtn.disabled = true;
                        startBtn.textContent = 'Running...';
                        leaveBtn.disabled = false;
                        break;
                    case 'error':
                        setStatus('red', 'Error');
                        log(data.message, 'error');
                        startBtn.disabled = false;
                        startBtn.textContent = 'Initialize & Join';
                        leaveBtn.disabled = true;
                        break;
                    case 'presence':
                        log(data.message, 'info');
                        break;
                }
            };

            ws.onerror = () => {
                connDot.classList.remove('online');
                connText.textContent = 'Connection Error';
                log('WebSocket error', 'error');
            };

            ws.onclose = () => {
                connDot.classList.remove('online');
                connText.textContent = 'Disconnected';
                log('WebSocket closed', 'error');
                isRunning = false;
                startBtn.disabled = false;
                startBtn.textContent = 'Initialize & Join';
                leaveBtn.disabled = true;
                setStatus('red', 'Disconnected');
            };
        }

        function handleStart() {
            const data = validate();
            if (!data) return;

            connectWS();

            setTimeout(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    consoleEl.innerHTML = '';
                    statusCard.style.display = 'block';
                    botStats.classList.remove('active');
                    statUser.textContent = '-';
                    statGame.textContent = '-';
                    
                    ws.send(JSON.stringify({
                        action: 'start',
                        cookie: data.cookie,
                        privateServerLink: data.link
                    }));
                    
                    startBtn.disabled = true;
                    startBtn.textContent = 'Connecting...';
                } else {
                    log('WebSocket not ready. Retrying...', 'error');
                    setTimeout(handleStart, 500);
                }
            }, 300);
        }

        function handleLeave() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'leave' }));
                log('Sending leave command...', 'status');
            }
            
            isRunning = false;
            startBtn.disabled = false;
            startBtn.textContent = 'Initialize & Join';
            leaveBtn.disabled = true;
            botStats.classList.remove('active');
        }

        cookieInput.addEventListener('input', () => {
            cookieInput.classList.remove('error');
            $('cookieErr').classList.remove('show');
        });

        psInput.addEventListener('input', () => {
            psInput.classList.remove('error');
            $('linkErr').classList.remove('show');
        });

        window.addEventListener('beforeunload', () => {
            if (ws) ws.close();
        });
    </script>
</body>
</html>
